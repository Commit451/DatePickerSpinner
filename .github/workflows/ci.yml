name: Build

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: gradle

      - name: Build & test Android, JVM & Web
        run: ./gradlew :datepickerspinner:check :shared:compileAndroidMain :shared:compileKotlinJvm :shared:compileKotlinJs :shared:compileKotlinWasmJs :androidApp:compileDebugKotlin :desktopApp:compileKotlin :webApp:compileKotlinJs :webApp:compileKotlinWasmJs
